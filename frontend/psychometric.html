<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychometric Test - AI Career Advisor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand" data-key="title">AI Career Advisor</div>
    <div class="navbar-nav">
        <span id="user-name"></span>
        <select id="languageSelector" style="padding: 8px 12px; border-radius: 4px; border: 1px solid #ddd; cursor: pointer;">
            <option value="English">English</option>
            <option value="Hindi">हिंदी</option>
        </select>
        <button class="btn btn-secondary" onclick="logout()" data-key="logout">Logout</button>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h1 data-key="psychometricTest">Psychometric Assessment</h1>
        <p data-key="psychometricDescription">Answer these questions honestly to help us understand your personality and interests.</p>
    </div>

    <div id="questions"></div>

    <div class="flex-between gap-12" style="margin-top: 32px; max-width: 1100px; margin-left: auto; margin-right: auto;">
        <button class="btn btn-secondary" onclick="goBack()" data-key="back">Back</button>
        <button class="btn btn-success" onclick="submitTest()" data-key="submitAnswers">Submit Assessment</button>
    </div>
</div>

<script src="js/translations.js"></script>
<script src="js/language.js"></script>
<script src="js/api.js"></script>
<script src="js/psychometric.js"></script>

</body>
</html>
