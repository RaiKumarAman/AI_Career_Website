<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Career Advisor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand" data-key="title">AI Career Advisor</div>
    <div class="navbar-nav">
        <select id="languageSelector" style="padding: 8px 12px; border-radius: 4px; border: 1px solid #ddd; cursor: pointer;">
            <option value="English">English</option>
            <option value="Hindi">हिंदी</option>
        </select>
        <a href="index.html" data-key="signIn">Sign In</a>
        <a href="#about" data-key="about">About</a>
    </div>
</nav>

<div class="container">
    <div class="card" style="max-width: 400px;">
        <h2 data-key="welcomeBack">Welcome Back</h2>
        
        <div class="form-group">
            <label for="email" data-key="emailAddress">Email Address</label>
            <input type="email" id="email" data-key="enterEmail" placeholder="Enter your email">
        </div>

        <div class="form-group">
            <label for="password" data-key="password">Password</label>
            <input type="password" id="password" data-key="enterPassword" placeholder="Enter your password">
        </div>

        <button class="btn btn-block" onclick="login()" data-key="signIn">Sign In</button>

        <p class="text-center text-muted mt-20">
            <span data-key="dontHaveAccount">Don't have an account?</span> <a href="signup.html" data-key="signUpHere">Sign up here</a>
        </p>
    </div>
</div>

<script src="js/translations.js"></script>
<script src="js/language.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
