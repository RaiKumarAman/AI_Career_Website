<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Subjects - AI Career Advisor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand" data-key="title">AI Career Advisor</div>
    <div class="navbar-nav">
        <span id="user-name"></span>
        <select id="languageSelector" style="padding: 8px 12px; border-radius: 4px; border: 1px solid #ddd; cursor: pointer;">
            <option value="English">English</option>
            <option value="Hindi">हिंदी</option>
        </select>
        <button class="btn btn-secondary" onclick="logout()" data-key="logout">Logout</button>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <h1 data-key="selectSubjects">Select Subjects</h1>
        <p data-key="chooseSubjectsForTest">Choose the subjects you'd like to be evaluated on</p>
    </div>

    <div class="card" style="max-width: 600px;">
        <div class="checkbox-list" id="subjects"></div>

        <button class="btn btn-block mt-24" onclick="generateTest()" data-key="proceedToTest">Start Evaluation Test</button>
    </div>
</div>

<script src="js/translations.js"></script>
<script src="js/language.js"></script>
<script src="js/api.js"></script>
<script src="js/subjects.js"></script>

</body>
</html>
