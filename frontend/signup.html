<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand" data-key="title">AI Career Advisor</div>
    <div class="navbar-nav">
        <select id="languageSelector" style="padding: 8px 12px; border-radius: 4px; border: 1px solid #ddd; cursor: pointer;">
            <option value="English">English</option>
            <option value="Hindi">हिंदी</option>
        </select>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h2 data-key="createAccount">Create Account</h2>

        <div class="form-group">
            <label for="name" data-key="name">Name</label>
            <input type="text" id="name" data-key="enterName" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label for="email" data-key="emailAddress">Email Address</label>
            <input type="email" id="email" data-key="enterEmail" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label for="password" data-key="password">Password</label>
            <input type="password" id="password" data-key="enterPassword" placeholder="Enter your password" required>
        </div>

        <button class="btn" onclick="signup()" data-key="signUp">Sign Up</button>

        <p class="text-center text-muted mt-20">
            <span data-key="alreadyHaveAccount">Already have an account?</span> <a href="index.html" data-key="loginHere">Login</a>
        </p>
    </div>
</div>

<script src="js/translations.js"></script>
<script src="js/language.js"></script>
<script src="js/api.js"></script>
<script src="js/signup.js"></script>

</body>
</html>
